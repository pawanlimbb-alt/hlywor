  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500&family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --board:  #2a1f14;
      --paper:  #faf6ee;
      --paper2: #f5edd8;
      --paper3: #ede3c8;
      --ink:    #1a1208;
      --ink2:   #3d3020;
      --ink3:   #6a5840;
      --ink4:   #a09078;
      --rule:   rgba(180,160,120,0.22);
      --fire:   #e8681a;
      --gold:   #d4a020;
      --acc:    var(--fire); /* overridden per person */
      --pin-shadow: 0 8px 36px rgba(0,0,0,0.48), 0 2px 8px rgba(0,0,0,0.28);
      --pixel:  'Press Start 2P', monospace;
      --serif:  'Crimson Pro', Georgia, serif;
      --sans:   'DM Sans', system-ui, sans-serif;
      --hand:   'Caveat', cursive;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--board);
      font-family: var(--serif);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Cork texture */
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image:
        radial-gradient(ellipse at 15% 25%, rgba(100,70,30,0.35) 0%, transparent 45%),
        radial-gradient(ellipse at 85% 70%, rgba(70,45,15,0.28) 0%, transparent 45%),
        url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.1'/%3E%3C/svg%3E");
      background-size: auto,auto,200px 200px;
      pointer-events: none; z-index: 0;
    }

    /* Warm glow follows accent */
    .acc-glow {
      position: fixed; width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(232,104,26,0.07) 0%, transparent 70%);
      top: 20%; left: 50%; transform: translateX(-50%);
      pointer-events: none; z-index: 0;
      animation: glowPulse 7s ease-in-out infinite;
    }
    @keyframes glowPulse { 0%,100%{opacity:.6;transform:translateX(-50%) scale(1)} 50%{opacity:1;transform:translateX(-50%) scale(1.1)} }

    /* Embers */
    .embers { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
    .ember {
      position: absolute; border-radius: 50%;
      animation: eR linear infinite; opacity: 0;
    }
    @keyframes eR {
      0%{transform:translateY(100vh) translateX(0);opacity:0}
      8%{opacity:.8} 85%{opacity:.3}
      100%{transform:translateY(-5vh) translateX(var(--ed));opacity:0}
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--board); }
    ::-webkit-scrollbar-thumb { background: var(--acc); border-radius: 2px; }

    /* Reading progress */
    #progress-bar {
      position: fixed; top: 0; left: 0;
      height: 3px; width: 0%;
      background: linear-gradient(90deg, var(--acc), var(--gold));
      z-index: 9999; transition: width 0.08s linear;
    }

    /* ── NAV ── */
    .nav {
      position: sticky; top: 0; z-index: 200;
      background: var(--ink);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px; height: 52px;
    }
    .nav-logo {
      font-family: var(--pixel); font-size: 0.55rem;
      color: var(--gold); letter-spacing: 2px;
      text-decoration: none;
      text-shadow: 0 0 12px rgba(212,160,32,0.4);
      animation: flicker 7s infinite;
    }
    @keyframes flicker { 0%,91%,100%{opacity:1}92%{opacity:.3}93%{opacity:1}95%{opacity:.65}96%{opacity:1} }
    .nav-back {
      font-family: var(--sans); font-size: 0.72rem;
      color: rgba(255,255,255,0.38); text-decoration: none;
      transition: color 0.2s;
    }
    .nav-back:hover { color: rgba(255,255,255,0.85); }
    .nav-back::before { content: '←'; margin-right: 5px; }

    /* ── LOADING ── */
    .loading {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 80vh; gap: 18px;
      position: relative; z-index: 1;
    }
    .loading-book {
      display: flex;
      animation: bookWobble 1.2s ease-in-out infinite;
    }
    @keyframes bookWobble { 0%,100%{transform:rotate(-2deg)} 50%{transform:rotate(2deg)} }
    .l-spine { width:10px;height:65px;background:linear-gradient(180deg,#3d2210,#2a1608,#4a2a12);border-radius:2px 0 0 2px; }
    .l-page  { width:46px;height:65px;background:var(--paper);display:flex;align-items:center;justify-content:center; }
    .l-page::after { content:'';width:28px;height:2px;background:linear-gradient(90deg,var(--fire),transparent);box-shadow:0 8px 0 var(--rule),0 16px 0 var(--rule),0 24px 0 var(--rule); }
    .loading-text { font-family:var(--hand);font-size:1.1rem;color:rgba(245,230,200,0.4);font-style:italic;animation:lFade 1.2s ease-in-out infinite; }
    @keyframes lFade { 0%,100%{opacity:.4} 50%{opacity:.9} }

    /* ── PAGE WRAP ── */
    .page-wrap {
      max-width: 900px; margin: 0 auto;
      padding: 0 24px 80px;
      position: relative; z-index: 1;
    }

    /* ── PROFILE HEADER — pinned card on board ── */
    .profile-header {
      padding-top: 44px;
      position: relative;
    }

    /* Book drop animation */
    @keyframes bookDrop {
      0%  { opacity:0; transform: translateY(-50px) rotate(-2deg) scale(0.96); }
      65% { opacity:1; transform: translateY(6px) rotate(0.4deg) scale(1.004); }
      82% { transform: translateY(-3px) rotate(-0.2deg); }
      100%{ opacity:1; transform: translateY(0) rotate(0deg) scale(1); }
    }

    .profile-sheet {
      display: flex;
      box-shadow: var(--pin-shadow);
      animation: bookDrop 0.9s cubic-bezier(0.34,1.4,0.64,1) both;
      position: relative;
    }

    /* Big pin */
    .profile-pin {
      position: absolute; top: -13px; left: 50%;
      transform: translateX(-50%);
      width: 16px; height: 16px; border-radius: 50%;
      box-shadow: 0 2px 6px rgba(0,0,0,0.6), inset 0 1px 2px rgba(255,255,255,0.3);
      z-index: 10;
      animation: pinDrop 0.9s cubic-bezier(0.34,1.56,0.64,1) both 0.1s;
    }
    @keyframes pinDrop { from{opacity:0;transform:translateX(-50%) translateY(-18px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
    .profile-pin::after {
      content:''; position:absolute;
      top:100%;left:50%;transform:translateX(-50%);
      width:2px;height:14px;background:linear-gradient(to bottom,#888,#333);
    }

    /* Spine */
    .profile-spine {
      width: 26px; flex-shrink: 0;
      background: linear-gradient(180deg,#3d2210 0%,#2a1608 20%,#4a2a12 40%,#2a1608 60%,#3d2210 80%,#2a1608 100%);
      border-right: 2px solid rgba(0,0,0,0.5);
      border-radius: 3px 0 0 3px; position: relative;
    }
    .profile-spine::before {
      content:''; position:absolute; top:0;left:50%;transform:translateX(-50%);
      width:6px; bottom:0;
      background:repeating-linear-gradient(to bottom,transparent 0px,transparent 28px,rgba(0,0,0,0.35) 28px,rgba(0,0,0,0.35) 34px);
    }

    /* Page */
    .profile-page {
      flex:1; background:var(--paper); position:relative; overflow:hidden;
    }
    .profile-page::before {
      content:''; position:absolute; inset:0;
      background-image:repeating-linear-gradient(to bottom,transparent 0px,transparent 31px,var(--rule) 31px,var(--rule) 32px);
      background-position:0 100px;
      pointer-events:none; z-index:0;
    }
    .profile-page::after {
      content:''; position:absolute; top:0;bottom:0;left:72px;
      width:1px; background:rgba(220,80,80,0.18);
      pointer-events:none; z-index:0;
    }
    .page-curl {
      position:absolute; bottom:0; right:0;
      width:42px; height:42px;
      background:linear-gradient(225deg,var(--paper3) 45%,rgba(0,0,0,0.1) 50%,var(--paper2) 50%);
      clip-path:polygon(100% 0,100% 100%,0 100%);
      pointer-events:none; z-index:10;
      transition:width 0.3s,height 0.3s;
    }
    .profile-sheet:hover .page-curl { width:56px; height:56px; }

    /* ── PROFILE TOP SECTION ── */
    .profile-top {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 28px;
      padding: 32px 32px 24px 88px;
      border-bottom: 1px solid var(--rule);
      position: relative; z-index: 2;
    }

    /* Photos collage */
    .profile-photos {
      position: relative; height: 260px;
    }
    .p-photo {
      position: absolute;
      background: #fff;
      padding: 6px 6px 22px;
      box-shadow: 2px 4px 14px rgba(0,0,0,0.3), 1px 1px 3px rgba(0,0,0,0.15);
      transition: transform 0.25s, box-shadow 0.25s, z-index 0s;
    }
    .p-photo:hover { box-shadow:4px 6px 22px rgba(0,0,0,0.45); z-index:20!important; }
    .p-photo img { width:100%; height:100%; object-fit:cover; display:block; filter:sepia(6%) brightness(0.97); }
    .p-photo-cap { font-family:var(--hand);font-size:0.72rem;color:var(--ink3);text-align:center;padding-top:4px;line-height:1.2; }
    /* Tape */
    .p-photo::before {
      content:''; position:absolute;
      top:-7px; left:50%; transform:translateX(-50%) rotate(-1deg);
      width:44px; height:14px;
      background:rgba(240,190,40,0.65); z-index:3;
    }
    .p-photo:nth-child(2)::before { background:rgba(80,130,220,0.55);transform:translateX(-50%) rotate(1.5deg); }
    .p-photo:nth-child(3)::before { background:rgba(80,180,100,0.55);transform:translateX(-50%) rotate(-0.5deg); }

    /* 1 photo */
    .profile-photos.c1 .p-photo:nth-child(1) { top:14px;left:50%;transform:translateX(-50%) rotate(-1.5deg);width:148px;height:148px; }
    /* 2 photos */
    .profile-photos.c2 .p-photo:nth-child(1) { top:8px;left:4px;width:134px;height:130px;transform:rotate(-3deg);z-index:2; }
    .profile-photos.c2 .p-photo:nth-child(2) { top:20px;right:4px;width:130px;height:126px;transform:rotate(2.5deg);z-index:1; }
    /* 3 photos */
    .profile-photos.c3 .p-photo:nth-child(1) { top:4px;left:50%;transform:translateX(-50%) rotate(-2deg);width:130px;height:122px;z-index:3; }
    .profile-photos.c3 .p-photo:nth-child(2) { bottom:0;left:0;width:120px;height:112px;transform:rotate(3deg);z-index:2; }
    .profile-photos.c3 .p-photo:nth-child(3) { bottom:0;right:0;width:120px;height:112px;transform:rotate(-2.5deg);z-index:1; }
    /* No photo */
    .profile-photos.c0 {
      height:160px; background:var(--paper3);
      display:flex;align-items:center;justify-content:center;
    }
    .no-photo-txt { font-family:var(--hand);font-size:1rem;color:var(--ink4);font-style:italic; }

    /* Right side of top */
    .profile-info { display:flex; flex-direction:column; gap:10px; }

    .profile-handle {
      font-family:var(--pixel); font-size:0.44rem;
      letter-spacing:1px; padding:4px 12px;
      color:#fff; display:inline-block;
      align-self:flex-start; transform:rotate(-0.5deg);
      margin-bottom:4px;
    }
    .profile-name {
      font-family:var(--hand);
      font-size:clamp(2rem,5vw,3rem);
      color:var(--ink); font-weight:700; line-height:1.1;
    }
    .profile-role {
      font-family:var(--pixel); font-size:0.36rem;
      letter-spacing:1px; margin-top:2px;
    }

    /* Prof + age chips */
    .chip-row { display:flex; flex-wrap:wrap; gap:5px; margin-top:6px; }
    .prof-chip {
      font-family:var(--hand); font-size:0.88rem;
      padding:3px 12px; color:#fff; border-radius:1px; opacity:0.88;
    }
    .age-chip {
      font-family:var(--pixel); font-size:0.32rem;
      padding:2px 8px; letter-spacing:1px;
      color:var(--ink3); border:1px solid rgba(26,18,8,0.15);
      background:var(--paper3);
    }
    .loc-chip {
      font-family:var(--hand); font-size:0.78rem;
      color:var(--ink3); padding:2px 8px;
      border:1px solid rgba(26,18,8,0.12);
      background:var(--paper2); border-radius:1px;
    }

    .profile-bio {
      font-family:var(--serif); font-size:1rem;
      font-style:italic; color:var(--ink2);
      line-height:1.75; margin-top:4px;
      max-width:480px;
    }

    /* Info list — diary style */
    .info-list {
      list-style:none;
      display:flex; flex-direction:column; gap:5px;
      margin-top:6px;
    }
    .info-list li {
      font-family:var(--hand); font-size:0.95rem;
      color:var(--ink2); display:flex; gap:8px;
    }
    .info-list li .lbl {
      font-family:var(--pixel); font-size:0.36rem;
      color:var(--ink4); letter-spacing:1px;
      width:74px; flex-shrink:0; padding-top:3px;
    }

    /* Social links */
    .social-links { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
    .social-link {
      font-family:var(--hand); font-size:0.85rem;
      color:#fff; padding:4px 14px;
      text-decoration:none; transition:all 0.2s;
      display:flex; align-items:center; gap:5px;
    }
    .social-link:hover { transform:translateY(-2px); filter:brightness(1.1); }

    /* Stats */
    .stats-grid {
      display:grid; grid-template-columns:1fr 1fr;
      gap:8px 20px; margin-top:10px;
    }
    .stat-row { display:flex; align-items:center; gap:8px; }
    .stat-lbl { font-family:var(--pixel);font-size:0.38rem;color:var(--ink4);letter-spacing:1px;width:62px;flex-shrink:0; }
    .stat-bar-w { flex:1;height:5px;background:rgba(26,18,8,0.07);border-radius:1px;overflow:hidden; }
    .stat-bar   { height:100%;border-radius:1px;background:var(--acc);transform:scaleX(0);transform-origin:left;transition:transform 0.9s cubic-bezier(0.34,1.2,0.64,1); }
    .stat-bar.in{ transform:scaleX(var(--sv,0.7)); }
    .stat-n     { font-family:var(--pixel);font-size:0.36rem;color:var(--ink4);width:22px;text-align:right;flex-shrink:0; }

    /* ── ABOUT SECTIONS — match pawan/charu style ── */
    .about-section {
      padding: 0;
      position: relative; z-index: 2;
    }

    /* Colored left-border block — same as join.html sec-block */
    .about-block {
      padding: 20px 32px 22px 88px;
      position: relative;
      border-left: 4px solid var(--acc);
      border-top: 1px dashed var(--rule);
    }
    .about-block:first-child { border-top: none; }

    /* Tape label floating at top */
    .about-block-label {
      display: inline-block;
      font-family: var(--pixel); font-size: 0.4rem;
      letter-spacing: 2px;
      background: var(--acc); color: #fff;
      padding: 4px 14px; line-height: 1.4;
      margin-bottom: 14px;
      transform: rotate(-0.3deg);
    }

    .about-text {
      font-family: var(--serif); font-size: 1rem;
      color: var(--ink2); line-height: 1.85; font-style: italic;
      max-width: 600px;
    }
    .about-text strong { font-style: normal; color: var(--ink); }

    /* Tags / interests */
    .tag-cloud { display:flex; flex-wrap:wrap; gap:6px; margin-top:4px; }
    .interest-tag {
      font-family: var(--hand); font-size: 0.9rem;
      color: var(--ink2); padding: 3px 12px;
      border: 1px solid rgba(26,18,8,0.15);
      background: var(--paper2); border-radius: 2px;
      transition: all 0.15s;
    }
    .interest-tag:hover { background: var(--paper3); }

    /* ── SOCIAL CARDS — pinned below the book exactly like pawan.html ── */
    .social-section {
      margin-top: 44px; position: relative; z-index: 1;
    }
    .social-heading {
      font-family: var(--pixel); font-size: 0.38rem;
      color: var(--acc); letter-spacing: 3px;
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 20px;
    }
    .social-heading::before {
      content: ''; display: inline-block;
      width: 18px; height: 1px; background: var(--acc);
    }
    .social-cards-wrap { display: flex; flex-wrap: wrap; gap: 14px; }
    .social-card-pin {
      background: var(--paper);
      padding: 12px 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.35);
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; color: var(--ink);
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
    }
    .social-card-pin:nth-child(odd)  { transform: rotate(-1deg); }
    .social-card-pin:nth-child(even) { transform: rotate(0.8deg); }
    .social-card-pin:hover {
      transform: rotate(0deg) translateY(-5px) !important;
      box-shadow: 0 12px 30px rgba(0,0,0,0.5);
    }
    .social-card-pin::before {
      content: ''; position: absolute; top: -7px; left: 50%;
      transform: translateX(-50%);
      width: 36px; height: 12px;
      background: rgba(240,190,40,0.65);
    }
    .social-card-icon  { font-size: 1.2rem; }
    .social-card-label { font-family: var(--hand); font-size: 1rem; color: var(--ink); }
    .social-card-handle{ font-family: var(--pixel); font-size: 0.28rem; color: var(--ink4); letter-spacing: 1px; }

    /* ── POSTS BY PERSON — below the book ── */
    .posts-section {
      margin-top:48px;
      position:relative;z-index:1;
    }
    .posts-section-head {
      display:flex;align-items:center;gap:14px;margin-bottom:24px;
    }
    .psh-label {
      font-family:var(--pixel);font-size:0.3rem;
      letter-spacing:3px;white-space:nowrap;
    }
    .psh-line { flex:1;height:1px;background:var(--rule); }

    .posts-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
      gap:1px;background:rgba(245,230,200,0.08);
    }
    .post-card {
      background:var(--paper);
      display:flex;flex-direction:column;
      transition:background 0.25s;position:relative;
      text-decoration:none;color:var(--ink);
    }
    .post-card:hover { background:var(--paper2); }
    .post-card::before {
      content:'';position:absolute;left:0;top:0;bottom:0;
      width:2px;background:var(--acc);
      transform:scaleY(0);transform-origin:bottom;
      transition:transform 0.3s ease;
    }
    .post-card:hover::before { transform:scaleY(1); }
    .post-thumb { width:100%;aspect-ratio:16/9;object-fit:cover;display:block;filter:sepia(8%);transition:filter 0.4s,transform 0.4s; }
    .post-card:hover .post-thumb { filter:sepia(0%);transform:scale(1.03); }
    .post-noimg { width:100%;aspect-ratio:16/9;background:var(--paper3);display:flex;align-items:center;justify-content:center; }
    .post-noimg-n { font-family:var(--pixel);font-size:2rem;color:transparent;-webkit-text-stroke:1px rgba(26,18,8,0.08); }
    .post-body { padding:18px;flex:1;display:flex;flex-direction:column; }
    .post-cat {
      font-family:var(--pixel);font-size:0.26rem;
      color:var(--acc);letter-spacing:2px;margin-bottom:8px;
    }
    .post-title {
      font-family:var(--hand);font-size:1.1rem;
      color:var(--ink);font-weight:600;line-height:1.4;margin-bottom:8px;
    }
    .post-desc {
      font-family:var(--sans);font-size:0.75rem;
      color:var(--ink3);line-height:1.7;flex:1;margin-bottom:12px;
    }
    .post-date {
      font-family:var(--sans);font-size:0.65rem;color:var(--ink4);
    }
    .post-read-link {
      font-family:var(--pixel);font-size:0.26rem;
      color:var(--acc);letter-spacing:1px;
      transition:letter-spacing 0.2s;
    }
    .post-card:hover .post-read-link { letter-spacing:3px; }

    /* No posts */
    .no-posts {
      grid-column:1/-1;padding:48px;text-align:center;
      font-family:var(--hand);font-size:1.1rem;
      color:rgba(245,230,200,0.35);font-style:italic;
    }

    /* Skel */
    .skel-p { background:var(--paper); }
    .skel-img { width:100%;aspect-ratio:16/9; }
    .skel-b { padding:18px;display:flex;flex-direction:column;gap:9px; }
    .skel-l { height:8px;border-radius:1px; }
    @keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}
    .shimmer {
      background:linear-gradient(90deg,var(--paper3) 25%,var(--paper2) 50%,var(--paper3) 75%);
      background-size:200% 100%;animation:shimmer 1.5s infinite;
    }

    /* Not found */

    /* Rich intro content — mirrors submit.html diary editor styles */

      font-family: var(--serif); font-size: 1rem;
      color: var(--ink2); line-height: 32px;
      max-width: 600px;
    }
    .about-rich-content h2 { font-family:var(--hand);font-size:1.7rem;color:var(--ink);margin:16px 0 8px;font-weight:600;line-height:1.4; }
    .about-rich-content h3 { font-family:var(--hand);font-size:1.25rem;color:var(--ink2);margin:12px 0 6px;line-height:1.4; }
    .about-rich-content p  { margin-bottom:6px; }
    .about-rich-content blockquote { margin:14px 0;padding:10px 18px;border-left:3px solid var(--acc);background:rgba(232,104,26,0.04);font-style:italic;color:var(--ink2); }
    .about-rich-content ul,.about-rich-content ol { padding-left:22px;margin:8px 0; }
    .about-rich-content li { line-height:32px; }
    .about-rich-content .sticky-callout { display:block;background:#fef9c3;padding:12px 16px;margin:12px 0;transform:rotate(-1deg);box-shadow:2px 3px 10px rgba(0,0,0,0.15);max-width:360px;font-family:var(--hand);font-size:1rem;color:var(--ink2);line-height:1.6;position:relative; }
    .about-rich-content .sticky-callout::before { content:'';position:absolute;top:-8px;left:50%;transform:translateX(-50%);width:48px;height:14px;background:rgba(240,190,40,0.65); }
    .about-rich-content .sticky-callout-blue  { background:#e8f0ff; }
    .about-rich-content .sticky-callout-blue::before  { background:rgba(80,130,220,0.55); }
    .about-rich-content .sticky-callout-green { background:#e8f5e8; }

    .about-rich-content .sticky-callout-pink  { background:#ffe8f0; }
    .about-rich-content .sticky-callout-pink::before  { background:rgba(220,80,120,0.55); }
    .about-rich-content .washi-tape { display:block;height:22px;margin:10px -36px 10px -88px;position:relative;overflow:hidden; }
    .about-rich-content .washi-tape::before { content:'';position:absolute;inset:0;background:var(--tape-color,rgba(240,190,40,0.65)); }
    .about-rich-content .doodle-divider { display:block;margin:16px 0;width:100%; }
    .about-rich-content .floating-sticker { display:inline-block;font-size:1.8rem;margin:0 4px;vertical-align:middle; }
    .about-rich-content .hl-y { background:rgba(255,220,50,0.4);padding:0 2px; }
    .about-rich-content .hl-r { background:rgba(255,100,100,0.3);padding:0 2px; }
    .about-rich-content .hl-g { background:rgba(100,220,100,0.3);padding:0 2px; }
    .about-rich-content .hl-b { background:rgba(100,150,255,0.3);padding:0 2px; }

    /* ── RESPONSIVE ── */
    @media(max-width:680px) {
      .profile-top { grid-template-columns:1fr; padding:24px 18px 18px 22px; }
      .profile-photos { height:200px; }
      .about-block { padding:18px 18px 18px 22px; }
      .profile-page::after { left:14px; }
      .posts-section { margin-top:32px; }
      .posts-grid { grid-template-columns:1fr; }
      .stats-grid { grid-template-columns:1fr; }
      .social-cards-wrap { flex-direction:column; }
    }
    @media(max-width:420px) {
      .page-wrap { padding:0 12px 60px; }
    }

    /* Footer */
    .site-footer {
      border-top:1px solid rgba(255,255,255,0.06);
      padding:20px 28px; margin-top:48px;
      display:flex; align-items:center; justify-content:space-between;
      flex-wrap:wrap; gap:10px;
      position:relative; z-index:1;
    }
    .site-footer p { font-family:var(--sans);font-size:0.68rem;color:rgba(255,255,255,0.2); }
    .footer-logo { font-family:var(--pixel);font-size:0.38rem;color:var(--gold);letter-spacing:2px; }

    /* ── STICK BUTTON ── */
    .stick-btn-wrap {
      position: relative; z-index: 2;
      padding: 0 32px 20px 88px;
      display: flex; align-items: center; gap: 12px;
    }
    .stick-btn {
      font-family: var(--hand); font-size: 1rem; font-weight: 700;
      padding: 8px 24px; border: none; cursor: pointer;
      transition: all .2s; display: flex; align-items: center; gap: 7px;
    }
    .stick-btn.unstuck { background: var(--acc); color: #fff; }
    .stick-btn.unstuck:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .stick-btn.stuck-state { background: var(--paper3); color: var(--ink2); border: 1px solid rgba(26,18,8,0.15); }
    .stick-btn.stuck-state:hover { background: rgba(192,57,43,0.08); color: #c0392b; border-color: rgba(192,57,43,0.3); }
    .stick-count { font-family: var(--pixel); font-size: 0.3rem; color: var(--ink4); letter-spacing: 1px; }
  
    /* ══════════════════════════════════
       BOTTOM DOCK — mobile nav
    ══════════════════════════════════ */
    .bottom-dock {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 1000;
      height: 62px;
      background: linear-gradient(180deg, #1a1008 0%, #0e0804 100%);
      border-top: 1px solid rgba(212,160,32,0.15);
      box-shadow: 0 -4px 24px rgba(0,0,0,0.6), 0 -1px 0 rgba(212,160,32,0.08);
    }
    .bottom-dock::before {
      content: '';
      position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 62' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
    }
    .bottom-dock::after {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(212,160,32,0.3) 20%, rgba(232,104,26,0.4) 50%, rgba(212,160,32,0.3) 80%, transparent 100%);
    }
    .dock-inner {
      display: flex; align-items: center;
      justify-content: space-around;
      height: 100%; padding: 0 8px;
      position: relative; z-index: 1;
    }
    .dock-item {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 3px; flex: 1; height: 100%;
      text-decoration: none; cursor: pointer;
      background: none; border: none; padding: 0;
      position: relative;
      transition: transform 0.18s cubic-bezier(0.34,1.4,0.64,1);
      -webkit-tap-highlight-color: transparent;
    }
    .dock-item:active { transform: scale(0.88); }
    .dock-icon {
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.22s ease;
    }
    .dock-icon svg {
      width: 100%; height: 100%;
      stroke: rgba(255,255,255,0.32); fill: none;
      stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
      transition: stroke 0.22s ease, filter 0.22s ease;
    }
    .dock-label {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.18rem; letter-spacing: 0.5px;
      color: rgba(255,255,255,0.25);
      transition: color 0.22s ease; white-space: nowrap;
    }
    .dock-item.active .dock-icon svg {
      stroke: #e8681a;
      filter: drop-shadow(0 0 5px rgba(232,104,26,0.7));
    }
    .dock-item.active .dock-label { color: #e8681a; }
    .dock-item.active::after {
      content: '';
      position: absolute; bottom: 6px; left: 50%;
      transform: translateX(-50%);
      width: 3px; height: 3px; border-radius: 50%;
      background: #e8681a; box-shadow: 0 0 6px #e8681a;
    }
    .dock-item.dock-write .dock-icon svg { stroke: rgba(232,104,26,0.6); }
    .dock-item.dock-write .dock-icon { width: 26px; height: 26px; }
    .dock-avatar {
      width: 24px; height: 24px; border-radius: 50%;
      object-fit: cover; border: 1.5px solid rgba(255,255,255,0.25);
      display: block; transition: border-color 0.2s;
    }
    .dock-item.active .dock-avatar {
      border-color: #e8681a; box-shadow: 0 0 8px rgba(232,104,26,0.5);
    }
    .dock-avatar-placeholder {
      width: 24px; height: 24px; border-radius: 50%;
      background: rgba(232,104,26,0.3);
      border: 1.5px solid rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Caveat', cursive;
      font-size: 0.75rem; color: rgba(255,255,255,0.7); font-weight: 700;
    }
    @media (max-width: 640px) {
      .bottom-dock { display: block; }
      body { padding-bottom: 62px; }
    }
</style>
</head>
<body>

        <div class="skel-p"><div class="skel-img shimmer"></div><div class="skel-b"><div class="skel-l shimmer" style="width:45%"></div><div class="skel-l shimmer" style="width:65%"></div></div></div>
        <div class="skel-p"><div class="skel-img shimmer"></div><div class="skel-b"><div class="skel-l shimmer" style="width:35%"></div><div class="skel-l shimmer" style="width:75%"></div></div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, addDoc, deleteDoc, doc, limit, orderBy, getCountFromServer }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { injectAuthNav, currentUser, onAuthChange, showLoginModal, getDisplayName } from "./auth.js";

// 🔧 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAg7yTP5YEDsTUpmNYhCi5iroqNQ_67o58",
  authDomain: "hlywor.firebaseapp.com",
  projectId: "hlywor",
  storageBucket: "hlywor.firebasestorage.app",
  messagingSenderId: "697637160825",
  appId: "1:697637160825:web:00dae42c1b0242c9f4d1a8",
  measurementId: "G-MQDXDWHLX8"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── Auth nav ──────────────────────────────────────────
injectAuthNav(document.getElementById('authSlot'), {
  onSignIn(user)  { if (currentPersonData) setupStickButton(currentPersonData, user); },
  onSignOut()     { hideStickButton(); }
});

// ── Auth state watcher ────────────────────────────────
onAuthChange(user => {
  if (currentPersonData) setupStickButton(currentPersonData, user);
});

/* Reading progress */
window.addEventListener('scroll', () => {
  const d = document.documentElement;
  document.getElementById('progress-bar').style.width =
    (d.scrollTop / (d.scrollHeight - d.clientHeight) * 100) + '%';
}, { passive: true });

/* Embers */
const ec = document.getElementById('embers');
for (let i = 0; i < 14; i++) {
  const e = document.createElement('div');
  e.className = 'ember';
  const s = 1 + Math.random() * 2;
  e.style.cssText = `left:${10+Math.random()*80}%;bottom:0;width:${s}px;height:${s}px;animation-duration:${8+Math.random()*12}s;animation-delay:${Math.random()*10}s;--ed:${(Math.random()-.5)*90}px;background:var(--acc);box-shadow:0 0 4px var(--acc);`;
  ec.appendChild(e);
}

/* Get identifier — supports ?slug=pawan or ?name=Pawan */
const params = new URLSearchParams(window.location.search);
const slug   = params.get('slug') || params.get('name');

let currentPersonData = null;

if (!slug) { showNotFound(); }
else { loadProfile(slug); }

/* ── Load person ── */
async function loadProfile(slug) {
  try {
    /* Try by slug field first, then by name (for legacy links) */
    let snap = await getDocs(query(
      collection(db,'people'),
      where('slug','==',slug.toLowerCase()),
      limit(1)
    ));
    if (snap.empty) {
      snap = await getDocs(query(
        collection(db,'people'),
        where('nameLower','==',slug.toLowerCase()),
        limit(1)
      ));
    }
    if (snap.empty) { showNotFound(); return; }
    const person = { id: snap.docs[0].id, ...snap.docs[0].data() };
    currentPersonData = person;
    renderProfile(person);
    loadPosts(person.name);
  } catch(err) {
    console.error(err); showNotFound();
  }
}

/* ── Render profile ── */
function renderProfile(p) {
  document.title = `${p.name} — HlyWor`;
  const acc = p.accent || '#e8681a';

  /* Apply accent color globally */
  document.documentElement.style.setProperty('--acc', acc);
  document.getElementById('profilePin').style.background =
    `radial-gradient(circle at 35% 35%, ${lighten(acc)}, ${acc})`;
  document.getElementById('accGlow').style.background =
    `radial-gradient(circle, ${acc}12 0%, transparent 70%)`;
  document.querySelector('::-webkit-scrollbar-thumb');

  /* Photos */
  const photos = (p.photos||[]).filter(Boolean).slice(0,3);
  let photosHtml = '';
  if (!photos.length) {
    photosHtml = `<div class="profile-photos c0"><span class="no-photo-txt">no photos yet</span></div>`;
  } else {
    const imgs = photos.map((url,i) => `
      <div class="p-photo">
        <img src="${url}" alt="${p.name}" loading="eager">
        ${p.photoCaptions?.[i] ? `<div class="p-photo-cap">${p.photoCaptions[i]}</div>` : ''}
      </div>`).join('');
    photosHtml = `<div class="profile-photos c${photos.length}">${imgs}</div>`;
  }

  /* Chips */
  const profChips = (p.professions||[]).slice(0,3).map(pr =>
    `<span class="prof-chip" style="background:${acc}">${pr}</span>`
  ).join('');
  const ageChip = p.age ? `<span class="age-chip">AGE: ${p.age}</span>` : '';
  const locChip = p.location ? `<span class="loc-chip">📍 ${p.location}</span>` : '';
  const chipRow = (profChips||ageChip||locChip)
    ? `<div class="chip-row">${profChips}${ageChip}${locChip}</div>` : '';

  /* Social links — rendered as pinned cards below the book */
  const socials = p.socials || {};
  const socialEntries = Object.entries(socials).filter(([,v])=>v);
  if (socialEntries.length) {
    const icons = { instagram:'📷', twitter:'🐦', youtube:'▶️', github:'💻', spotify:'🎵', mal:'🎌', portfolio:'🔗' };
    document.getElementById('socialCardsWrap').innerHTML = socialEntries.map(([k,v]) => `
      <a class="social-card-pin" href="${v}" target="_blank" rel="noopener">
        <span class="social-card-icon">${icons[k]||'🔗'}</span>
        <div>
          <div class="social-card-label">${k.charAt(0).toUpperCase()+k.slice(1)}</div>
          <div class="social-card-handle">${v.replace(/https?:\/\/(www\.)?/,'').split('/')[0]}</div>
        </div>
      </a>`).join('');
    document.getElementById('socialSection').style.display = 'block';
  }

  /* Also add HlyWor posts link card always */
  const hlywor = document.createElement('a');
  hlywor.className = 'social-card-pin';
  hlywor.href = 'index.html';
  hlywor.innerHTML = `<span class="social-card-icon">📖</span><div><div class="social-card-label">HlyWor</div><div class="social-card-handle">read their posts</div></div>`;
  document.getElementById('socialCardsWrap').appendChild(hlywor);
  document.getElementById('socialSection').style.display = 'block';

  /* Stats */
  const stats = p.stats || [];
  const statsHtml = stats.length ? `
    <div class="stats-grid" id="statsGrid">
      ${stats.slice(0,4).map(s => {
        const v = Math.min(99,Math.max(1,parseInt(s.val)||50));
        return `<div class="stat-row">
          <span class="stat-lbl">${(s.label||'').slice(0,7)}</span>
          <div class="stat-bar-w"><div class="stat-bar" style="--sv:${(v/100).toFixed(2)}"></div></div>
          <span class="stat-n">${String(v).padStart(2,'0')}</span>
        </div>`;
      }).join('')}
    </div>` : '';

  /* MBTI / pronouns / birthday */
  const infoItems = [
    p.pronouns  && ['PRONOUNS',  p.pronouns],
    p.birthday  && ['BIRTHDAY',  p.birthday],
    p.mbti      && ['MBTI',      p.mbti],
    p.language  && ['LANGUAGE',  p.language],
  ].filter(Boolean);
  const infoHtml = infoItems.length ? `
    <ul class="info-list">
      ${infoItems.map(([lbl,val])=>`<li><span class="lbl">${lbl}</span>${val}</li>`).join('')}
    </ul>` : '';

  document.getElementById('profileTop').innerHTML = `
    ${photosHtml}
    <div class="profile-info">
      <span class="profile-handle" style="background:${acc}">${p.handle || p.name.split(' ')[0].toUpperCase()+'.EXE'}</span>
      <div class="profile-name">${p.name}</div>
      <div class="profile-role" style="color:${acc}">${(p.role||'').toUpperCase()}</div>
      ${chipRow}
      <p class="profile-bio">${p.bio||''}</p>
      ${infoHtml}
      ${statsHtml}
    </div>`;

  /* Animate stat bars */
  setTimeout(() => {
    document.querySelectorAll('.stat-bar').forEach(b => b.classList.add('in'));
  }, 700);

  /* ── About sections ── */
  const sections = [];
  if (p.beforeFollow) sections.push(['BEFORE YOU FOLLOW', p.beforeFollow, false]);
  if (p.interests && p.interests.length) sections.push(['INTERESTS', p.interests, true]);
  if (p.likes)      sections.push(['LIKES',    p.likes, false]);
  if (p.dislikes)   sections.push(['NOT FOR ME', p.dislikes, false]);
  if (p.cwList)     sections.push(['TW / CW', p.cwList, false]);
  if (p.extraNote)  sections.push(['NOTE',    p.extraNote, false]);

  let sectionsHtml = sections.map(([lbl, content, isTags]) => `
    <div class="about-section">
      <div class="about-block">
        <div class="about-block-label">${lbl}</div>
        ${isTags
          ? `<div class="tag-cloud">${content.map(t=>`<span class="interest-tag">${t}</span>`).join('')}</div>`
          : `<p class="about-text">${content}</p>`
        }
      </div>
    </div>`).join('');

  /* Full intro — rich diary content written by user */
  if (p.aboutContent && p.aboutContent.trim() && p.aboutContent.trim() !== '<p><br></p>') {
    sectionsHtml += `
      <div class="about-section">
        <div class="about-block">
          <div class="about-block-label">IN THEIR OWN WORDS</div>
          <div class="about-rich-content">${p.aboutContent}</div>
        </div>
      </div>`;
  }

  document.getElementById('profileSections').innerHTML = sectionsHtml + `<div style="height:32px"></div>`;

  /* Show */
  document.getElementById('loadingState').style.display  = 'none';
  document.getElementById('profileWrap').style.display   = 'block';
}

/* ── Load their posts ── */
async function loadPosts(authorName) {
  try {
    const snap = await getDocs(query(
      collection(db,'posts'),
      where('author','==',authorName),
      where('status','==','published'),
      orderBy('createdAt','desc')
    ));
    const posts = snap.docs.map(d => ({id:d.id,...d.data()}));

    const section  = document.getElementById('postsSection');
    const grid     = document.getElementById('postsGrid');
    const countEl  = document.getElementById('postsCount');
    const labelEl  = document.getElementById('postsLabel');

    labelEl.textContent = `${authorName.split(' ')[0].toUpperCase()}'S POSTS`;
    countEl.textContent = `${posts.length} POST${posts.length!==1?'S':''}`;
    section.style.display = 'block';

    if (!posts.length) {
      grid.innerHTML = `<div class="no-posts">No posts yet — watch this space.</div>`;
      return;
    }

    grid.innerHTML = '';
    posts.forEach((post, i) => {
      const card = document.createElement('a');
      card.className = 'post-card';
      card.href = `post.html?slug=${post.slug}`;
      card.style.animationDelay = `${i*55}ms`;

      const thumb = post.thumbnail
        ? `<img class="post-thumb" src="${post.thumbnail}" alt="${post.title}" loading="lazy">`
        : `<div class="post-noimg"><span class="post-noimg-n">${String(i+1).padStart(2,'0')}</span></div>`;

      const dateStr = post.date
        ? new Date(post.date).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})
        : '';

      card.innerHTML = `
        ${thumb}
        <div class="post-body">
          <div class="post-cat">${(post.category||post.type||'post').toUpperCase()}</div>
          <div class="post-title">${post.title}</div>
          <p class="post-desc">${post.desc||''}</p>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-top:auto">
            ${dateStr?`<span class="post-date">${dateStr}</span>`:'<span></span>'}
            <span class="post-read-link">READ →</span>
          </div>
        </div>`;
      grid.appendChild(card);
    });
  } catch(err) { console.error('Posts:', err); }
}

/* ── Stick count ── */
async function loadStickCount(toUid) {
  try {
    const snap = await getDocs(query(collection(db,'sticks'), where('toUid','==',toUid)));
    const count = snap.size;
    const countEl = document.getElementById('stickCount');
    if (countEl) countEl.textContent = count > 0 ? `${count} stuck` : '';
  } catch(e) {}
}

/* ── Stick button setup ── */
async function setupStickButton(person, user) {
  const wrap = document.getElementById('stickBtnWrap');
  const btn  = document.getElementById('stickBtn');
  if (!wrap || !btn) return;

  // Don't show on own profile
  if (!user || !person.authorUid || user.uid === person.authorUid) {
    hideStickButton(); return;
  }

  wrap.style.display = 'flex';
  loadStickCount(person.authorUid);

  // Check if already stuck
  let stickDocId = null;
  try {
    const existing = await getDocs(query(
      collection(db,'sticks'),
      where('fromUid','==',user.uid),
      where('toUid','==',person.authorUid),
      limit(1)
    ));
    if (!existing.empty) {
      stickDocId = existing.docs[0].id;
      setStuckState(btn, true);
    } else {
      setStuckState(btn, false);
    }
  } catch(e) { console.error(e); }

  // Remove old listener by cloning
  const newBtn = btn.cloneNode(true);
  btn.parentNode.replaceChild(newBtn, btn);

  newBtn.addEventListener('click', async () => {
    if (!currentUser) {
      showLoginModal({ prompt: 'Sign in to stick someone to your board.' });
      return;
    }
    newBtn.disabled = true;

    if (stickDocId) {
      // Unstick
      try {
        await deleteDoc(doc(db,'sticks',stickDocId));
        stickDocId = null;
        setStuckState(newBtn, false);
        loadStickCount(person.authorUid);
      } catch(e) { console.error(e); }
    } else {
      // Stick
      try {
        const fromName = getDisplayName(currentUser);
        const fromSnap = await getDocs(query(
          collection(db,'people'),
          where('authorUid','==',currentUser.uid),
          limit(1)
        ));
        const fromSlug = fromSnap.empty ? '' : fromSnap.docs[0].data().slug || '';
        const ref = await addDoc(collection(db,'sticks'), {
          fromUid:  currentUser.uid,
          fromName, fromSlug,
          toUid:    person.authorUid,
          toSlug:   person.slug || '',
          toName:   person.name,
          createdAt: new Date()
        });
        stickDocId = ref.id;
        setStuckState(newBtn, true);
        loadStickCount(person.authorUid);
      } catch(e) { console.error(e); }
    }
    newBtn.disabled = false;
  });
}

function setStuckState(btn, isStuck) {
  if (isStuck) {
    btn.textContent = '📌 Stuck ✦';
    btn.className = 'stick-btn stuck-state';
    btn.title = 'Click to unstick';
  } else {
    btn.textContent = '📌 Stick them';
    btn.className = 'stick-btn unstuck';
    btn.title = 'Add to your board';
  }
}

function hideStickButton() {
  const wrap = document.getElementById('stickBtnWrap');
  if (wrap) wrap.style.display = 'none';
}

function showNotFound() {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('notFound').style.display = 'block';
}

function lighten(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,r+60)},${Math.min(255,g+60)},${Math.min(255,b+60)})`;
}
